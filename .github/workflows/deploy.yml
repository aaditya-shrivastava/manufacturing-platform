name: Build, Push & Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push manufacturing-creator
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker-files/Dockerfile.manufacturing-creator
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/manufacturing-creator:latest

      - name: Build & Push multi-agent-manufacturing
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker-files/Dockerfile.multi-agent-manufacturing
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/multi-agent-manufacturing:latest

      - name: Build & Push main-app
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker-files/Dockerfile.main-app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/main-app:latest

  deploy-to-ec2:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/manufacturing-platform
            git pull origin main

            eval $(minikube docker-env)
            docker ps -q | xargs docker stop || true
            docker rmi $(docker images 'dockeruser2004/*' -q) --force || true
            docker pull dockeruser2004/main-app:latest
            docker pull dockeruser2004/manufacturing-creator:latest
            docker pull dockeruser2004/multi-agent-manufacturing:latest

            kubectl apply -f ~/manufacturing-platform/k8s/configmap-secrets.yaml
            kubectl apply -f ~/manufacturing-platform/k8s/manufacturing-creator-deployment.yaml
            kubectl apply -f ~/manufacturing-platform/k8s/multi-agent-manufacturing-deployment.yaml
            kubectl apply -f ~/manufacturing-platform/k8s/main-app-deployment.yaml
            kubectl apply -f ~/manufacturing-platform/k8s/ingress.yaml

            kubectl rollout restart deployment/manufacturing-creator
            kubectl rollout restart deployment/multi-agent-manufacturing
            kubectl rollout restart deployment/main-app

            kubectl rollout status deployment/manufacturing-creator
            kubectl rollout status deployment/multi-agent-manufacturing
            kubectl rollout status deployment/main-app