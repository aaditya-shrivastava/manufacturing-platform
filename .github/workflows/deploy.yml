# ============================================================
#  deploy.yml
#  GitHub Actions — Build, Push & Deploy to EC2
#
#  Triggers: Every push to main branch
#  Actions:
#    1. Build all 3 Docker images
#    2. Push to Docker Hub
#    3. SSH into EC2 and deploy via kubectl
# ============================================================

name: Build, Push & Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      # ── Step 1: Checkout code ──
      - name: Checkout code
        uses: actions/checkout@v3

      # ── Step 2: Login to Docker Hub ──
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Step 3: Set version tag using commit SHA ──
      - name: Set image version
        id: version
        run: echo "VERSION=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      # ── Step 4: Build & Push manufacturing-creator ──
      - name: Build & Push manufacturing-creator
        run: |
          docker build -f docker-files/Dockerfile.manufacturing-creator \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/manufacturing-creator:${{ steps.version.outputs.VERSION }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/manufacturing-creator:latest \
            .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/manufacturing-creator:${{ steps.version.outputs.VERSION }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/manufacturing-creator:latest

      # ── Step 5: Build & Push multi-agent-manufacturing ──
      - name: Build & Push multi-agent-manufacturing
        run: |
          docker build -f docker-files/Dockerfile.multi-agent-manufacturing \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/multi-agent-manufacturing:${{ steps.version.outputs.VERSION }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/manufacturing-creator:latest \
            .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/multi-agent-manufacturing:${{ steps.version.outputs.VERSION }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/multi-agent-manufacturing:latest

      # ── Step 6: Build & Push main-app ──
      - name: Build & Push main-app
        run: |
          docker build -f docker-files/Dockerfile.main-app \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/main-app:${{ steps.version.outputs.VERSION }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/main-app:latest \
            .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/main-app:${{ steps.version.outputs.VERSION }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/main-app:latest

      # ── Step 7: Deploy to EC2 via SSH ──
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Update all 3 deployments with new image version
            kubectl set image deployment/manufacturing-creator \
              manufacturing-creator=${{ secrets.DOCKERHUB_USERNAME }}/manufacturing-creator:${{ steps.version.outputs.VERSION }}

            kubectl set image deployment/multi-agent-manufacturing \
              multi-agent-manufacturing=${{ secrets.DOCKERHUB_USERNAME }}/multi-agent-manufacturing:${{ steps.version.outputs.VERSION }}

            kubectl set image deployment/main-app \
              main-app=${{ secrets.DOCKERHUB_USERNAME }}/main-app:${{ steps.version.outputs.VERSION }}

            # Wait for all rollouts to complete
            kubectl rollout status deployment/manufacturing-creator
            kubectl rollout status deployment/multi-agent-manufacturing
            kubectl rollout status deployment/main-app

            echo "========================================"
            echo " Deployment complete!"
            kubectl get pods
            echo "========================================"

