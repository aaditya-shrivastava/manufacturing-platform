# ============================================================
#  configmap-secrets.yaml
#  Kubernetes Secret — stores API keys & env vars for all pods
#
#  HOW TO USE:
#  Values must be base64 encoded. Encode your values like this:
#    echo -n "your-actual-value" | base64
#
#  Then replace the placeholder base64 values below.
#
#  Apply with:
#    kubectl apply -f configmap-secrets.yaml
# ============================================================

apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
type: Opaque
data:
  # Base64 encoded values — replace with your actual encoded secrets
  # Example: echo -n "sk-ant-xxxxx" | base64
  ANTHROPIC_API_KEY: eW91ci1hbnRocm9waWMtYXBpLWtlWT==   # <-- replace
  GROQ_API_KEY: Z3NrX05YbWpyRUptOXFXZ2I3RXlWajJ4V0dkeWIzRllqeTIyamJQMGR2eW1CUTJWTFAyTHJMa0w=   # Base64
  # Add more keys below as needed, e.g:
  # OPENAI_API_KEY: eW91ci1vcGVuYWkta2V5

---

# ============================================================
#  ConfigMap — non-sensitive environment variables
# ============================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"