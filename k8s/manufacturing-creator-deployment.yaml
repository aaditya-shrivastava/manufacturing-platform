# ============================================================
#  manufacturing-creator-deployment.yaml
#  Deployment + Service for App 1 (port 8500)
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: manufacturing-creator
  labels:
    app: manufacturing-creator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: manufacturing-creator
  template:
    metadata:
      labels:
        app: manufacturing-creator
    spec:
      containers:
        - name: manufacturing-creator
          image: dockeruser2004/manufacturing-creator:1.0.0   # <-- replace username
          ports:
            - containerPort: 8500
          envFrom:
            - secretRef:
                name: app-secrets          # references configmap-secrets.yaml
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8500
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8500
            initialDelaySeconds: 30
            periodSeconds: 20

---

apiVersion: v1
kind: Service
metadata:
  name: manufacturing-creator-svc
spec:
  selector:
    app: manufacturing-creator
  ports:
    - protocol: TCP
      port: 8500
      targetPort: 8500
  type: ClusterIP