# ============================================================
#  multi-agent-manufacturing-deployment.yaml
#  Deployment + Service for App 2 (port 8501)
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: multi-agent-manufacturing
  labels:
    app: multi-agent-manufacturing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: multi-agent-manufacturing
  template:
    metadata:
      labels:
        app: multi-agent-manufacturing
    spec:
      containers:
        - name: multi-agent-manufacturing
          image: dockeruser2004/multi-agent-manufacturing:1.0.0   # <-- replace username
          imagePullPolicy: Always
          ports:
            - containerPort: 8501
          envFrom:
            - secretRef:
                name: app-secrets          # references configmap-secrets.yaml
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 30
            periodSeconds: 20

---

apiVersion: v1
kind: Service
metadata:
  name: multi-agent-manufacturing-svc
spec:
  selector:
    app: multi-agent-manufacturing
  ports:
    - protocol: TCP
      port: 8501
      targetPort: 8501
  type: ClusterIP