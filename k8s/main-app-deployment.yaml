# ============================================================
#  main-app-deployment.yaml
#  Deployment + Service for App 3 (port 8502)
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-app
  labels:
    app: main-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: main-app
  template:
    metadata:
      labels:
        app: main-app
    spec:
      containers:
        - name: main-app
          image: dockeruser2004/main-app:1.0.0   # <-- replace username
          imagePullPolicy: Always
          ports:
            - containerPort: 8502
          envFrom:
            - secretRef:
                name: app-secrets          # references configmap-secrets.yaml
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8502
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8502
            initialDelaySeconds: 30
            periodSeconds: 20

---

apiVersion: v1
kind: Service
metadata:
  name: main-app-svc
spec:
  selector:
    app: main-app
  ports:
    - protocol: TCP
      port: 8502
      targetPort: 8502
  type: ClusterIP